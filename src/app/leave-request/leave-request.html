<div class="container mt-4">
  <div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-header bg-primary text-white">
      <h5 class="card-title mb-0">Apply for Leave</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="leaveForm" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Emp ID</label>
          <input formControlName="empId" type="number" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Reason</label>
          <textarea formControlName="reason" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="leaveForm.invalid">Submit</button>
      </form>
    </div>
  </div>
</div>
