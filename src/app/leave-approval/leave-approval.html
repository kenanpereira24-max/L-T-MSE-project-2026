<h2>Pending Approvals</h2>
@for (req of requests; track req.id) {
  @if (req.status === 'Pending') {
    <mat-card style="margin-bottom: 10px; padding: 15px">
      <mat-card-content>Emp ID: {{ req.empId }} | Reason: {{ req.reason }}</mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" (click)="update(req.id, 'Approved')">
          Approve
        </button>
        <button mat-button color="warn" (click)="update(req.id, 'Rejected')">Reject</button>
      </mat-card-actions>
    </mat-card>
  }
} @empty {
  <p>No pending requests.</p>
}
