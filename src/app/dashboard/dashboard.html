<div style="display: flex; gap: 20px">
  <mat-card style="flex: 1; padding: 20px; text-align: center; background: #e3f2fd">
    <mat-card-header><mat-card-title>Total Employees</mat-card-title></mat-card-header>
    <mat-card-content
      ><h1>{{ total }}</h1></mat-card-content
    >
  </mat-card>
  <mat-card style="flex: 1; padding: 20px; text-align: center; background: #e8f5e9">
    <mat-card-header><mat-card-title>Present Today</mat-card-title></mat-card-header>
    <mat-card-content
      ><h1 style="color: green">{{ present }}</h1></mat-card-content
    >
  </mat-card>
</div>
